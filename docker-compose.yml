# =============================================================================
#  Video Studio – universal stack definition (Portainer)
#
#  One media tree under /media (read + write). Default output is set in the
#  app settings (default: /media/output). All GPU devices are passed through
#  (Intel/AMD via /dev/dri, Nvidia via the container runtime).
# =============================================================================
services:
  av1-vmaf-studio:
    build: .
    # Or use the GHCR image directly (no local build):
    # image: ghcr.io/popel1988/av1-vmaf-studio:latest
    container_name: av1-vmaf-studio
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-8080}:8080"

    # Set paths conveniently in Portainer under "Environment variables"
    # (MEDIA_PATH) – no need to edit this file.
    volumes:
      # Full media tree (sources + encodes)
      - ${MEDIA_PATH:-/media}:/media
      # Persistent app data (settings, queue, screenshots, cache)
      - ${DATA_PATH:-./data}:/data
      # --- Extra media folders (optional) ----------------------------------
      # To mount separate trees, add more volume mounts and list them under
      # MEDIA_DIRS below (Name=/path).
      # Example:
      # - /mnt/nas/movies:/media/movies
      # - /mnt/nas/shows:/media/shows

    # --- Hardware access ---------------------------------------------------
    # privileged gives full access to sysfs/DRM (clean GPU metrics).
    privileged: true

    # Intel/AMD GPU (VAAPI/QSV) – pass through DRM render nodes
    devices:
      - /dev/dri:/dev/dri

    # Nvidia: runtime + capabilities (nvidia-container-toolkit required)
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # This image is based on CUDA 12.6 (Ubuntu 24.04). If the host Nvidia
      # driver is older (e.g. manually mounted on QNAP), the
      # nvidia-container-toolkit may refuse to start with a CUDA version
      # error. Uncomment the next line to skip that check (safe with a
      # manual driver mount + privileged):
      # - NVIDIA_DISABLE_REQUIRE=true
      - PUID=0
      - PGID=0
      - METRICS_INTERVAL=1.5
      - DATA_DIR=/data
      - MEDIA_DIR=/media
      - RETAIN_VMAF_SESSIONS=true
      # --- Extra media folders (optional) ---------------------------------
      # Expose the extra mounts above as named roots.
      # Format: "Name=/path" separated by ; (or newline).
      # Without this variable, only the single /media mount is used.
      # - MEDIA_DIRS=Movies=/media/movies;Shows=/media/shows
      # --- Logging --------------------------------------------------------
      # Log verbosity: DEBUG | INFO | WARNING | ERROR (default INFO).
      # At the start of each encode, all parameters are logged.
      - LOG_LEVEL=INFO
      # Log the full FFmpeg command line for every encode (1/0).
      - LOG_FFMPEG_CMD=1
      # --- Intel iGPU (VAAPI) / AMD VAAPI ---------------------------------
      # Force the Intel media driver (needed for Intel iGPUs like UHD 730).
      - LIBVA_DRIVER_NAME=iHD
      # DRM render node of the GPU to use. IMPORTANT with multiple GPUs
      # (Nvidia + Intel iGPU): renderD128 may NOT be the Intel iGPU –
      # set it to renderD129 or similar. Check inside the container with:
      #   vainfo --display drm --device /dev/dri/renderD128
      - VAAPI_DEVICE=/dev/dri/renderD128
      # Intel encoder backend: "vaapi" (default) or "qsv". The image
      # (Ubuntu 24.04, libva + oneVPL) supports both. Set QSV only if needed.
      # - INTEL_ENCODER=qsv

    # Modern GPU reservation (Compose v2.4+/Portainer). On Intel/AMD-only
    # hosts without Nvidia, the entire deploy block can be removed.
    #
    # Optional: CPU/RAM limits (commented out). Exceeding memory makes the
    # kernel OOM-kill the container – tune values to your host.
    # GPU VRAM is not limited here. Also keep parallel encodes in the app
    # low if the host is tight on resources.
    deploy:
      resources:
        # limits:
        #   cpus: "8.0"       # max CPU cores (share)
        #   memory: 24G       # hard RAM limit
        # reservations:
        #   cpus: "2.0"       # optional minimum reserve
        #   memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, video]

    # --- Finer alternative TO 'privileged: true' -------------------------
    # (comment out privileged and use the following instead)
    # cap_add:
    #   - SYS_ADMIN
    # group_add:
    #   - video
    #   - render
