# =============================================================================
#  AV1 / VMAF Compression Studio – Universelle Stack-Definition (Portainer)
#
#  Reicht /media/input + /media/output sowie ALLE GPU-Geräte durch
#  (Intel/AMD via /dev/dri, Nvidia via Container-Runtime). Für eine fehlerfreie
#  Hardware-Auslastungsanzeige wird privileged genutzt (alternativ unten das
#  feingranulare Device-Mapping einkommentieren).
# =============================================================================
services:
  av1-vmaf-studio:
    build: .
    # Alternativ direkt das GHCR-Image nutzen (ohne lokalen Build):
    # image: ghcr.io/popel1988/av1-vmaf-studio:latest
    container_name: av1-vmaf-studio
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-8080}:8080"

    # Pfade bequem in Portainer unter "Environment variables" setzen
    # (INPUT_PATH / OUTPUT_PATH) – kein Editieren der Datei nötig.
    volumes:
      - ${INPUT_PATH:-/media/input}:/media/input
      - ${OUTPUT_PATH:-/media/output}:/media/output
      # Persistenter App-Datenordner (Screenshots, VMAF-Sessions, Cache)
      - ${DATA_PATH:-./data}:/data

    # --- Hardware-Zugriff --------------------------------------------------
    # privileged sorgt für vollen Zugriff auf sysfs/DRM (saubere GPU-Metriken).
    privileged: true

    # Intel/AMD GPU (VAAPI/QSV) – DRM-Render-Knoten durchreichen
    devices:
      - /dev/dri:/dev/dri

    # Nvidia: Runtime + Capabilities (nvidia-container-toolkit erforderlich)
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # Das Image basiert auf CUDA 12.6 (Ubuntu 24.04). Ist der (z. B. auf QNAP
      # gemountete) Nvidia-Treiber älter, verweigert das nvidia-container-toolkit
      # evtl. den Start mit einer CUDA-Versionsmeldung. Dann folgende Zeile
      # einkommentieren – überspringt die Prüfung (bei manuellem Treiber-Mount
      # + privileged unbedenklich):
      # - NVIDIA_DISABLE_REQUIRE=true
      - PUID=0
      - PGID=0
      - METRICS_INTERVAL=1.5
      - DATA_DIR=/data
      - RETAIN_VMAF_SESSIONS=true
      # --- Logging -----------------------------------------------------------
      # Log-Ausführlichkeit: DEBUG | INFO | WARNING | ERROR (Standard INFO).
      # Beim Start jedes Encodes werden alle Parameter geloggt.
      - LOG_LEVEL=INFO
      # Vollständige FFmpeg-Kommandozeile jedes Encodes mitloggen (1/0).
      - LOG_FFMPEG_CMD=1
      # --- Intel iGPU (VAAPI) / AMD VAAPI ------------------------------------
      # Intel-Media-Treiber erzwingen (nötig für Intel-iGPU wie UHD 730).
      - LIBVA_DRIVER_NAME=iHD
      # DRM-Render-Knoten der zu nutzenden GPU. WICHTIG bei mehreren GPUs
      # (Nvidia + Intel-iGPU): renderD128 ist evtl. NICHT die Intel-iGPU –
      # dann auf renderD129 o. Ä. setzen. Im Container prüfen mit:
      #   vainfo --display drm --device /dev/dri/renderD128
      - VAAPI_DEVICE=/dev/dri/renderD128
      # Intel-Encoder-Backend: "vaapi" (Standard) oder "qsv". Das Image (Ubuntu
      # 24.04, libva 2.20 + oneVPL) unterstützt beide. QSV nur bei Bedarf setzen.
      # - INTEL_ENCODER=qsv

    # Moderne GPU-Reservierung (Compose v2.4+/Portainer). Bei reinen Intel/AMD-
    # Systemen ohne Nvidia kann der gesamte deploy-Block entfernt werden.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, video]

    # --- Feingranulare Alternative ZU 'privileged: true' -------------------
    # (privileged auskommentieren und stattdessen folgendes nutzen)
    # cap_add:
    #   - SYS_ADMIN
    # group_add:
    #   - video
    #   - render
